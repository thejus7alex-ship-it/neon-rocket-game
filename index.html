<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ROK-STRIKER: WEB COMMAND</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0814;
            font-family: 'Courier New', monospace;
            color: #f0f0ff;
            touch-action: none;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
        }
        .loading {
            font-size: 24px;
            color: #00ffc8;
            text-shadow: 0 0 10px #00ffc8;
            animation: pulse 1.5s infinite;
            position: absolute;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loadingText">STARTING GAME ENGINE...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas to match screen size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);
        
        // Get screen dimensions
        let SCREEN_WIDTH = canvas.width;
        let SCREEN_HEIGHT = canvas.height;
        
        // Hide loading text
        document.getElementById('loadingText').style.display = 'none';

        // Colors
        const COLOR_BG = '#0a0814';
        const COLOR_PLAYER = '#00ffc8';
        const COLOR_ENEMY = '#ff3232';
        const COLOR_LASER = '#ffff00';
        const COLOR_GRID = '#1c1830';
        const COLOR_TEXT = '#f0f0ff';
        const COLOR_METRIC = '#00b4ff';
        const COLOR_JOYSTICK = '#646478';

        // Game state
        let playerX = 100;
        let playerY = SCREEN_HEIGHT / 2;
        let playerBaseSpeed = 7.0;
        let playerWidth = 45;
        let playerHeight = 24;

        let playerLasers = [];
        let enemies = [];
        let starfield = [];

        // Initialize starfield
        for (let i = 0; i < 50; i++) {
            starfield.push({
                x: Math.random() * SCREEN_WIDTH,
                y: Math.random() * SCREEN_HEIGHT,
                speed: Math.random() * 3 + 1.5
            });
        }

        let coreScore = 0;
        let highScore = 0;
        let kills = 0;
        let bestKillRate = 0.0;
        let survivalTime = 0.0;

        let enemySpawnTimer = 0.0;
        let laserCooldownTimer = 0.0;
        let gameOver = false;

        // Joystick - positioned at bottom left
        const JOYSTICK_CENTER = { x: 100, y: SCREEN_HEIGHT - 100 };
        const JOYSTICK_BASE_RADIUS = 50;
        const JOYSTICK_KNOB_RADIUS = 20;
        let joystickKnobPos = { x: JOYSTICK_CENTER.x, y: JOYSTICK_CENTER.y };
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 };

        // Audio context for sound generation
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSynthSound(freqStart, freqEnd, durationMs) {
            const now = audioContext.currentTime;
            const duration = durationMs / 1000;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.setValueAtTime(freqStart, now);
            osc.frequency.exponentialRampToValueAtTime(freqEnd, now + duration);

            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            osc.start(now);
            osc.stop(now + duration);
        }

        // Mouse/Touch event handlers
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mousePos = {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };

            if (gameOver) {
                resetGame();
            } else {
                const distToJoystick = Math.hypot(
                    mousePos.x - JOYSTICK_CENTER.x,
                    mousePos.y - JOYSTICK_CENTER.y
                );
                if (distToJoystick <= JOYSTICK_BASE_RADIUS + 10) {
                    joystickActive = true;
                }
            }
        });

        canvas.addEventListener('mouseup', () => {
            joystickActive = false;
            joystickKnobPos = { ...JOYSTICK_CENTER };
            joystickVector = { x: 0, y: 0 };
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!joystickActive) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const motionPos = {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };

            const dx = motionPos.x - JOYSTICK_CENTER.x;
            const dy = motionPos.y - JOYSTICK_CENTER.y;
            const distance = Math.hypot(dx, dy);

            if (distance === 0) {
                joystickVector = { x: 0, y: 0 };
                joystickKnobPos = { ...JOYSTICK_CENTER };
            } else {
                const clampDist = Math.min(distance, JOYSTICK_BASE_RADIUS);
                const powerRatio = clampDist / JOYSTICK_BASE_RADIUS;
                joystickVector = {
                    x: (dx / distance) * powerRatio,
                    y: (dy / distance) * powerRatio
                };
                joystickKnobPos = {
                    x: JOYSTICK_CENTER.x + (dx / distance) * clampDist,
                    y: JOYSTICK_CENTER.y + (dy / distance) * clampDist
                };
            }
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const touchPos = {
                x: (touch.clientX - rect.left) * (canvas.width / rect.width),
                y: (touch.clientY - rect.top) * (canvas.height / rect.height)
            };

            if (gameOver) {
                resetGame();
            } else {
                const distToJoystick = Math.hypot(
                    touchPos.x - JOYSTICK_CENTER.x,
                    touchPos.y - JOYSTICK_CENTER.y
                );
                if (distToJoystick <= JOYSTICK_BASE_RADIUS + 10) {
                    joystickActive = true;
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            joystickActive = false;
            joystickKnobPos = { ...JOYSTICK_CENTER };
            joystickVector = { x: 0, y: 0 };
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const motionPos = {
                x: (touch.clientX - rect.left) * (canvas.width / rect.width),
                y: (touch.clientY - rect.top) * (canvas.height / rect.height)
            };

            const dx = motionPos.x - JOYSTICK_CENTER.x;
            const dy = motionPos.y - JOYSTICK_CENTER.y;
            const distance = Math.hypot(dx, dy);

            if (distance === 0) {
                joystickVector = { x: 0, y: 0 };
                joystickKnobPos = { ...JOYSTICK_CENTER };
            } else {
                const clampDist = Math.min(distance, JOYSTICK_BASE_RADIUS);
                const powerRatio = clampDist / JOYSTICK_BASE_RADIUS;
                joystickVector = {
                    x: (dx / distance) * powerRatio,
                    y: (dy / distance) * powerRatio
                };
                joystickKnobPos = {
                    x: JOYSTICK_CENTER.x + (dx / distance) * clampDist,
                    y: JOYSTICK_CENTER.y + (dy / distance) * clampDist
                };
            }
        }, { passive: false });

        function resetGame() {
            playerX = 100;
            playerY = SCREEN_HEIGHT / 2;
            playerLasers = [];
            enemies = [];
            coreScore = 0;
            kills = 0;
            survivalTime = 0.0;
            joystickActive = false;
            joystickKnobPos = { ...JOYSTICK_CENTER };
            joystickVector = { x: 0, y: 0 };
            gameOver = false;
        }

        function drawGrid() {
            ctx.strokeStyle = COLOR_GRID;
            ctx.lineWidth = 1;
            for (let x = 0; x < SCREEN_WIDTH; x += 60) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, SCREEN_HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y < SCREEN_HEIGHT; y += 60) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(SCREEN_WIDTH, y);
                ctx.stroke();
            }
        }

        function drawStars() {
            ctx.fillStyle = '#7878b4';
            for (let star of starfield) {
                star.x -= star.speed;
                if (star.x < 0) {
                    star.x = SCREEN_WIDTH;
                    star.y = Math.random() * SCREEN_HEIGHT;
                }
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.speed / 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawPlayer() {
            if (gameOver) return;

            // Flame
            ctx.fillStyle = '#ff6400';
            ctx.beginPath();
            ctx.moveTo(playerX, playerY + 4);
            ctx.lineTo(playerX - 16, playerY + 12);
            ctx.lineTo(playerX, playerY + 20);
            ctx.closePath();
            ctx.fill();

            // Inner flame
            ctx.fillStyle = '#ffdc00';
            ctx.beginPath();
            ctx.moveTo(playerX, playerY + 7);
            ctx.lineTo(playerX - 10, playerY + 12);
            ctx.lineTo(playerX, playerY + 17);
            ctx.closePath();
            ctx.fill();

            // Body
            ctx.fillStyle = COLOR_PLAYER;
            ctx.fillRect(playerX, playerY, 32, playerHeight);

            // Nose cone
            ctx.beginPath();
            ctx.moveTo(playerX + 32, playerY);
            ctx.lineTo(playerX + playerWidth, playerY + 12);
            ctx.lineTo(playerX + 32, playerY + playerHeight);
            ctx.closePath();
            ctx.fill();

            // Engine
            ctx.fillStyle = '#0099a0';
            ctx.fillRect(playerX, playerY - 6, 8, 36);

            // Cockpit
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(playerX + 16, playerY + 5, 12, 14);
        }

        function drawLasers() {
            ctx.strokeStyle = COLOR_LASER;
            ctx.lineWidth = 3;
            for (let laser of playerLasers) {
                ctx.beginPath();
                ctx.moveTo(laser.x, laser.y);
                ctx.lineTo(laser.x + 18, laser.y);
                ctx.stroke();
            }
        }

        function drawEnemies() {
            for (let enemy of enemies) {
                const ex = enemy.x;
                const ey = enemy.y;

                // Body
                ctx.fillStyle = COLOR_ENEMY;
                ctx.fillRect(ex + 10, ey, 30, 24);

                // Wing
                ctx.beginPath();
                ctx.moveTo(ex + 10, ey);
                ctx.lineTo(ex, ey + 12);
                ctx.lineTo(ex + 10, ey + 24);
                ctx.closePath();
                ctx.fill();

                // Engine
                ctx.fillStyle = '#a01e3c';
                ctx.fillRect(ex + 32, ey - 6, 8, 36);

                // Flame
                ctx.fillStyle = '#ff9600';
                ctx.beginPath();
                ctx.moveTo(ex + 40, ey + 6);
                ctx.lineTo(ex + 52, ey + 12);
                ctx.lineTo(ex + 40, ey + 18);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawJoystick() {
            if (gameOver) return;

            // Base
            ctx.fillStyle = 'rgba(40, 40, 55, 0.3)';
            ctx.beginPath();
            ctx.arc(JOYSTICK_CENTER.x, JOYSTICK_CENTER.y, JOYSTICK_BASE_RADIUS, 0, Math.PI * 2);
            ctx.fill();

            // Base outline
            ctx.strokeStyle = COLOR_JOYSTICK;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(JOYSTICK_CENTER.x, JOYSTICK_CENTER.y, JOYSTICK_BASE_RADIUS, 0, Math.PI * 2);
            ctx.stroke();

            // Knob
            ctx.fillStyle = joystickActive ? COLOR_PLAYER : COLOR_JOYSTICK;
            ctx.beginPath();
            ctx.arc(joystickKnobPos.x, joystickKnobPos.y, JOYSTICK_KNOB_RADIUS, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawHUD() {
            if (gameOver) return;

            // Header background
            ctx.fillStyle = 'rgba(5, 4, 10, 1)';
            ctx.fillRect(0, 0, SCREEN_WIDTH, 50);

            // Header line
            ctx.strokeStyle = COLOR_GRID;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 50);
            ctx.lineTo(SCREEN_WIDTH, 50);
            ctx.stroke();

            // Text
            ctx.fillStyle = COLOR_TEXT;
            ctx.font = 'bold 14px "Courier New"';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${coreScore}`, 15, 30);

            const currentKillRate = survivalTime > 1.0 ? (kills / survivalTime) * 60.0 : 0.0;
            ctx.fillStyle = COLOR_METRIC;
            ctx.fillText(`KILL RATE: ${currentKillRate.toFixed(1)}/MIN`, SCREEN_WIDTH / 3, 30);

            ctx.fillStyle = COLOR_LASER;
            ctx.fillText(`BEST: ${bestKillRate.toFixed(1)}/MIN`, (SCREEN_WIDTH * 2) / 3, 30);
        }

        function drawGameOver() {
            ctx.fillStyle = COLOR_ENEMY;
            ctx.font = 'bold 28px "Courier New"';
            ctx.textAlign = 'center';
            ctx.fillText('ROCKET HULL DESTROYED', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 3);

            ctx.fillStyle = COLOR_TEXT;
            ctx.font = 'bold 14px "Courier New"';
            ctx.fillText(`SCORE: ${coreScore}`, SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2);

            const peakRate = survivalTime > 1.0 ? (kills / survivalTime) * 60.0 : 0.0;
            ctx.fillStyle = COLOR_METRIC;
            ctx.fillText(`PEAK: ${peakRate.toFixed(1)} KILLS/MIN`, SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2 + 40);

            ctx.fillStyle = COLOR_PLAYER;
            ctx.font = 'bold 16px "Courier New"';
            ctx.fillText('[ TAP TO RESPAWN ]', SCREEN_WIDTH / 2, SCREEN_HEIGHT - 50);
        }

        let lastTime = Date.now();

        function gameLoop() {
            const now = Date.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            // Update screen dimensions if window resized
            SCREEN_WIDTH = canvas.width;
            SCREEN_HEIGHT = canvas.height;

            // Update
            if (!gameOver) {
                survivalTime += dt;

                // Player movement
                playerX += joystickVector.x * playerBaseSpeed;
                playerY += joystickVector.y * playerBaseSpeed;

                // Clamp player position
                playerX = Math.max(15, Math.min(SCREEN_WIDTH / 2, playerX));
                playerY = Math.max(60, Math.min(SCREEN_HEIGHT - 45, playerY));

                // Laser shooting
                laserCooldownTimer += dt;
                if (laserCooldownTimer >= 0.16) {
                    laserCooldownTimer = 0.0;
                    playerLasers.push({
                        x: playerX + playerWidth,
                        y: playerY + playerHeight / 2
                    });
                    playSynthSound(880, 440, 120);
                }

                // Update lasers
                for (let i = playerLasers.length - 1; i >= 0; i--) {
                    playerLasers[i].x += 13.0;
                    if (playerLasers[i].x > SCREEN_WIDTH) {
                        playerLasers.splice(i, 1);
                    }
                }

                // Spawn enemies
                enemySpawnTimer += dt;
                const spawnRate = Math.max(0.22, 0.75 - (coreScore * 0.02));
                if (enemySpawnTimer >= spawnRate) {
                    enemySpawnTimer = 0.0;
                    enemies.push({
                        x: SCREEN_WIDTH + 40,
                        y: Math.random() * (SCREEN_HEIGHT - 120) + 70,
                        speed: Math.random() * 3 + 3.5 + (coreScore * 0.12)
                    });
                }

                // Update enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    enemies[i].x -= enemies[i].speed;

                    if (enemies[i].x < -50) {
                        enemies.splice(i, 1);
                        coreScore += 1;
                        continue;
                    }

                    // Check laser collision
                    for (let j = playerLasers.length - 1; j >= 0; j--) {
                        const laser = playerLasers[j];
                        const ex = enemies[i].x;
                        const ey = enemies[i].y;

                        if (laser.x >= ex && laser.x <= ex + 40 && laser.y >= ey && laser.y <= ey + 24) {
                            playSynthSound(120, 30, 250);
                            enemies.splice(i, 1);
                            playerLasers.splice(j, 1);
                            coreScore += 2;
                            kills += 1;
                            break;
                        }
                    }

                    // Check player collision
                    if (i < enemies.length) {
                        const ex = enemies[i].x;
                        const ey = enemies[i].y;
                        if (ex <= playerX + playerWidth && ex + 40 >= playerX &&
                            ey <= playerY + playerHeight && ey + 24 >= playerY) {
                            playSynthSound(400, 80, 600);
                            gameOver = true;
                            if (coreScore > highScore) {
                                highScore = coreScore;
                            }
                        }
                    }
                }

                // Update kill rate
                if (survivalTime > 1.0) {
                    const currentKillRate = (kills / survivalTime) * 60.0;
                    if (currentKillRate > bestKillRate) {
                        bestKillRate = currentKillRate;
                    }
                }
            }

            // Draw
            ctx.fillStyle = COLOR_BG;
            ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

            drawGrid();
            drawStars();
            drawLasers();
            drawEnemies();
            drawPlayer();
            drawJoystick();
            drawHUD();

            if (gameOver) {
                drawGameOver();
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
